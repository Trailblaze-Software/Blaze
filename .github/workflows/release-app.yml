---
name: Release Application
on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: ["*"]
  workflow_dispatch:
permissions:
  contents: write
  packages: write
env:
  # Binary cache stored in this repo's GitHub Packages (NuGet) feed. The
  # previous `x-gha` backend was removed by vcpkg in 2025 and also capped at
  # 10 GB per repo, causing constant cache eviction/thrashing with Qt+GDAL.
  # GitHub Packages on a public repo has no practical storage limit.
  VCPKG_BINARY_SOURCES: "clear;nuget,GitHub,readwrite"
jobs:
  package-windows:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
        include:
          - arch: x64
            triplet: x64-windows
            os: windows-latest
          - arch: arm64
            triplet: arm64-windows
            os: windows-11-arm
    env:
      VCPKG_TARGET_TRIPLET: ${{ matrix.triplet }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/v', ''
          echo "version=$tag" >> $env:GITHUB_OUTPUT
          echo "Version: $tag"
      - name: Cache NSIS
        id: nsis-cache
        uses: actions/cache@v4
        with:
          path: 'C:\Program Files (x86)\NSIS'
          key: nsis-3.11-${{ runner.os }}
      - name: Install NSIS
        if: steps.nsis-cache.outputs.cache-hit != 'true'
        run: choco install nsis -y
      - name: Add NSIS to PATH
        run: echo "C:\Program Files (x86)\NSIS" >> $env:GITHUB_PATH
      - name: Set vcpkg binary cache write mode
        shell: pwsh
        run: |
          # Fork PRs receive a GITHUB_TOKEN scoped to the fork — it has no
          # packages:write on the upstream org, so any push attempt gets a 403.
          # Fall back to read-only so the build still benefits from cached
          # packages without trying (and failing) to push new ones.
          $isForkPR = ("${{ github.event_name }}" -eq "pull_request") -and `
                      ("${{ github.event.pull_request.head.repo.full_name }}" -ne "${{ github.repository }}")
          if ($isForkPR) {
            "VCPKG_BINARY_SOURCES=clear;nuget,GitHub,read" |
              Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "Fork PR detected — vcpkg binary cache set to read-only"
          } else {
            Write-Host "vcpkg binary cache remains readwrite"
          }
      - name: Configure vcpkg binary cache (GitHub Packages NuGet)
        shell: pwsh
        run: |
          $owner = '${{ github.repository_owner }}'
          $feed  = "https://nuget.pkg.github.com/$owner/index.json"
          $push  = "https://nuget.pkg.github.com/$owner/"
          $token = '${{ secrets.VCPKG_NUGET_TOKEN }}'

          Write-Host "Feed  : $feed"
          Write-Host "Push  : $push"
          Write-Host "Token : length=$($token.Length) prefix=$($token.Substring(0, [Math]::Min(8,$token.Length)))..."

          # Write NuGet.Config directly so the credentials are available to every
          # nuget.exe (Chocolatey, VS, vcpkg-bundled) without relying on nuget.exe
          # command-line registration. PackageSourceCredentials provides Basic auth
          # and <apikeys> provides the X-NuGet-ApiKey header for the push URL.
          $configPath = "$env:APPDATA\NuGet\NuGet.Config"
          New-Item -Force -ItemType Directory (Split-Path $configPath) | Out-Null

          $configContent = @(
            '<?xml version="1.0" encoding="utf-8"?>',
            '<configuration>',
            '  <packageSources>',
            "    <add key=""GitHub"" value=""$feed"" protocolVersion=""3"" />",
            '  </packageSources>',
            '  <packageSourceCredentials>',
            '    <GitHub>',
            '      <add key="Username" value="x-access-token" />',
            "      <add key=""ClearTextPassword"" value=""$token"" />",
            '    </GitHub>',
            '  </packageSourceCredentials>',
            '  <apikeys>',
            "    <add key=""$push"" value=""$token"" />",
            '  </apikeys>',
            '</configuration>'
          ) -join "`n"
          Set-Content -Path $configPath -Value $configContent -Encoding UTF8
          Write-Host "Wrote $configPath"
          Write-Host "--- NuGet.Config (token redacted) ---"
          (Get-Content $configPath) -replace '(?<=value=")[^"]*ghs[^"]*', '[REDACTED]' | Write-Host

          # Export env vars that must be visible to the cmake step (where vcpkg
          # actually invokes nuget push). GITHUB_ENV persists values across steps.
          #
          # VSS_NUGET_EXTERNAL_FEED_ENDPOINTS: tells the Azure Artifacts Credential
          # Provider (pre-installed on GitHub Actions Windows runners) that this feed
          # has credentials available, so it returns them non-interactively instead
          # of demanding interactive OAuth (which would fail with -NonInteractive).
          #
          # NUGET_CREDENTIALPROVIDER_SESSIONTOKENCACHE_ENABLED: prevents ACCP from
          # trying to refresh a cached interactive session token.
          $endpoints = [ordered]@{
            endpointCredentials = @(
              [ordered]@{ endpoint = $feed; username = "x-access-token"; password = $token }
            )
          } | ConvertTo-Json -Compress
          "VSS_NUGET_EXTERNAL_FEED_ENDPOINTS=$endpoints" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "NUGET_CREDENTIALPROVIDER_SESSIONTOKENCACHE_ENABLED=false" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Exported VSS_NUGET_EXTERNAL_FEED_ENDPOINTS and NUGET_CREDENTIALPROVIDER_SESSIONTOKENCACHE_ENABLED"
      - name: Set up MSVC dev cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.arch }}
      - name: Configure
        shell: pwsh
        run: |
          $cmakeArgs = @(
            "-DVCPKG_TARGET_TRIPLET=${{ env.VCPKG_TARGET_TRIPLET }}",
            "-DVCPKG_BUILD_TYPE=release",
            "-DVCPKG_VERBOSE=ON"
          )
          if ("${{ steps.version.outputs.version }}" -ne "") {
            $cmakeArgs += "-DBLAZE_VERSION=${{ steps.version.outputs.version }}"
          }
          cmake -B build $cmakeArgs
      - name: Debug vcpkg NuGet auth
        if: failure()
        shell: pwsh
        run: |
          $owner = '${{ github.repository_owner }}'
          $token = '${{ secrets.GITHUB_TOKEN }}'
          $feed  = "https://nuget.pkg.github.com/$owner/index.json"

          Write-Host "=== NuGet sources ==="
          nuget sources list 2>&1

          Write-Host "`n=== Token auth test against GitHub Packages feed ==="
          try {
            $r = Invoke-WebRequest -Uri $feed `
              -Headers @{ Authorization = "Bearer $token" } `
              -UseBasicParsing -ErrorAction Stop
            Write-Host "HTTP $($r.StatusCode) — feed reachable, token accepted"
          } catch {
            Write-Host "HTTP $($_.Exception.Response.StatusCode.value__) — $($_.Exception.Message)"
          }

          Write-Host "`n=== NuGet.Config (token redacted) ==="
          $f = "$env:APPDATA\NuGet\NuGet.Config"
          if (Test-Path $f) {
            (Get-Content $f) -replace '(?<=ClearTextPassword value=")[^"]*', '[REDACTED]' |
              Write-Host
          } else {
            Write-Host "Not found: $f"
          }

          Write-Host "`n=== nuget.exe on PATH ==="
          Get-Command nuget -All -ErrorAction SilentlyContinue |
            Select-Object -ExpandProperty Source | Write-Host
      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel
      - name: Package (NSIS Installer)
        run: |
          cd build
          cpack -C Release -G NSIS
      - name: Debug NSIS Failure
        if: failure()
        run: |
          if (Test-Path "build/_CPack_Packages/win64/NSIS/NSISOutput.log") {
            Get-Content "build/_CPack_Packages/win64/NSIS/NSISOutput.log"
          }
      - name: Install package
        run: |
          $installer = (Get-Item build/Blaze-*.exe).FullName
          Start-Process -Wait -FilePath $installer -ArgumentList '/S', '/D=C:\BlazeTest'
      - name: Test installed package
        run: |
          Copy-Item -Recurse C:\BlazeTest\share\assets $env:TEMP\blaze-test
          & C:\BlazeTest\bin\blaze-cli.exe $env:TEMP\blaze-test\default_config.json
      # Skip on PRs and push-to-main to stay under the 0.5 GB Actions storage
      # quota — installers are ~200 MB each and 4 platforms × every push fills
      # the quota in a day. Tag builds publish to the GitHub Release (separate,
      # unlimited storage on public repos), and workflow_dispatch keeps a
      # short-retention artifact for manual debug runs.
      - name: Upload Artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: blaze-windows-${{ matrix.arch }}-installer
          path: build/Blaze-*.exe
          retention-days: 2
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          token: ${{ secrets.BLAZE_RELEASE_TOKEN }}
          files: build/Blaze-*.exe
  package-linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Version: $TAG"
      - name: Install dependencies
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libgdal-dev libopencv-dev cmake libomp-dev rpm qt6-base-dev libglx-dev
            libgl1-mesa-dev qt6-image-formats-plugins libqt6svg6-dev ccache mold ninja-build
          version: 1.1
          execute_install_scripts: true
      # Install LAPACK/BLAS directly (not via cache) because liblapack.so.3 and
      # libblas.so.3 are update-alternatives-managed symlinks; cache-apt-pkgs-action
      # restores package files but does not run update-alternatives triggers, so the
      # .so.3 symlinks are missing when restored from cache (breaks linking on arm64).
      - name: Install LAPACK/BLAS
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            liblapack-dev libblas-dev liblapack3 libblas3
          sudo ldconfig
      - name: Verify LAPACK installation
        run: |
          ldconfig -p | grep -E 'lapack|blas' \
            || echo "Warning: LAPACK/BLAS not found in library cache"
          ls -la /usr/lib/*/liblapack* /usr/lib/*/libblas* 2>/dev/null \
            || echo "Warning: LAPACK/BLAS libraries not found"
      - name: Configure
        run: |
          CMAKE_ARGS=""
          if [ -n "${{ steps.version.outputs.version }}" ]; then
            CMAKE_ARGS="-DBLAZE_VERSION=${{ steps.version.outputs.version }}"
          fi
          cmake -B build $CMAKE_ARGS
      - name: Build
        run: cmake --build build --config Release
      - name: Package (DEB)
        run: |
          cd build
          cpack -C Release -G DEB
      - name: Install DEB package
        run: |
          sudo dpkg -i build/Blaze-*.deb || true
          sudo apt-get install -f -y
      - name: Test installed package
        run: |
          cp -r /usr/share/assets /tmp/blaze-test
          blaze-cli /tmp/blaze-test/default_config.json
      # See note on the Windows job — only keep artifacts on tags / debug runs.
      - name: Upload Artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: blaze-linux-${{ matrix.arch }}-deb
          path: build/Blaze-*.deb
          retention-days: 2
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          token: ${{ secrets.BLAZE_RELEASE_TOKEN }}
          files: build/Blaze-*.deb
  package-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: macos-latest
          - arch: x86_64
            os: macos-26-intel
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Get version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Version: $TAG"
      - name: Install dependencies (non-Qt)
        run: |
          # Qt comes from the official online installer (jurplel/install-qt-action
          # below), NOT from Homebrew. Homebrew's Qt6 is patched with
          # @executable_path rpaths and split across ~40 separate kegs, both
          # of which break macdeployqt's framework deployment in ways that
          # require ugly manual workarounds. The official Qt distribution
          # is what macdeployqt was designed for and "just works".
          brew install cmake ninja ccache gdal opencv libomp openblas lapack
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          # 6.9.2+ removes the broken "-framework AGL" reference from
          # WrapOpenGL that breaks linking on the macOS 26 SDK (where AGL
          # no longer exists). CMakeLists also filters it defensively.
          version: '6.9.2'
          host: 'mac'
          target: 'desktop'
          # clang_64 is a universal binary on macOS Qt 6 — same archive
          # works for both Apple Silicon and Intel runners.
          arch: 'clang_64'
          # qtimageformats provides Qt6::QTiffPlugin which Blaze imports.
          # qtbase/qtsvg/qttools come by default; macdeployqt ships in qttools.
          modules: 'qtimageformats'
          cache: true
      - name: Configure
        run: |
          LIBOMP=$(brew --prefix libomp)
          # install-qt-action exports QT_ROOT_DIR pointing at the Qt
          # installation (e.g. .../Qt/6.9.0/macos) and adds its bin/ to
          # PATH so macdeployqt is found automatically downstream.
          CMAKE_ARGS=(
            "-DCMAKE_BUILD_TYPE=Release"
            "-DOpenMP_CXX_FLAGS=-Xpreprocessor -fopenmp -I${LIBOMP}/include"
            "-DOpenMP_CXX_LIB_NAMES=omp"
            "-DOpenMP_omp_LIBRARY=${LIBOMP}/lib/libomp.dylib"
            "-DOpenMP_C_FLAGS=-Xpreprocessor -fopenmp -I${LIBOMP}/include"
            "-DOpenMP_C_LIB_NAMES=omp"
            "-DOpenMP_C_LIBRARY=${LIBOMP}/lib/libomp.dylib"
            "-DCMAKE_PREFIX_PATH=${QT_ROOT_DIR}"
            # Blaze3D is included. It costs ~2x DMG size because macdeployqt
            # bundles a second full copy of the Qt+GDAL stack into Blaze3D.app
            # (the two apps don't yet share frameworks).
            "-DBLAZE_BUILD_3D_GUI=ON"
          )
          if [ -n "${{ steps.version.outputs.version }}" ]; then
            CMAKE_ARGS+=("-DBLAZE_VERSION=${{ steps.version.outputs.version }}")
          fi
          cmake -B build "${CMAKE_ARGS[@]}"
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Stage install
        run: cmake --install build --prefix staging --config Release
      - name: Bundle assets inside .app bundles
        run: |
          # Make each GUI app self-contained by copying assets into the bundle.
          # Without this the downloaded, quarantined .app crashes on launch under
          # Gatekeeper App Translocation (runs from a random temp dir with no
          # sibling share/assets). See scripts/macos-bundle-assets.sh header.
          chmod +x scripts/macos-bundle-assets.sh
          apps=()
          for app in staging/Blaze.app staging/Blaze3D.app; do
            [ -d "$app" ] && apps+=("$app")
          done
          scripts/macos-bundle-assets.sh staging/share/assets "${apps[@]}"
      - name: Deploy Qt frameworks
        run: |
          # macdeployqt comes from the official Qt distribution (installed
          # by jurplel/install-qt-action, which prepends its bin/ to PATH).
          # No -libpath gymnastics needed: official Qt has all modules
          # under a single prefix and uses standard @rpath references that
          # macdeployqt resolves natively.
          for app in staging/Blaze.app staging/Blaze3D.app; do
            [ -d "$app" ] && macdeployqt "$app" -always-overwrite
          done

          # Sanity check that every Qt framework each app links got bundled.
          verify_frameworks() {
            local app="$1"; shift
            local fw_dir="staging/$app.app/Contents/Frameworks"
            local fw
            for fw in "$@"; do
              if [ ! -d "$fw_dir/$fw.framework" ]; then
                echo "ERROR: $fw.framework missing from $app.app bundle" >&2
                echo "Contents of $fw_dir:" >&2
                ls -la "$fw_dir" >&2 || true
                exit 1
              fi
            done
            echo "$app.app: all required Qt frameworks present"
          }

          [ -d staging/Blaze.app ]   && verify_frameworks Blaze   QtCore QtGui QtWidgets QtConcurrent
          [ -d staging/Blaze3D.app ] && verify_frameworks Blaze3D QtCore QtGui QtWidgets QtConcurrent
      - name: Bundle missing transitive libraries
        run: |
          # macdeployqt leaves out (a) transitive dependencies of the Homebrew
          # GDAL stack (GDAL -> libgeos_c -> libgeos, jpeg-xl, the AWS SDK),
          # whose "@loader_path/../lib" rpath breaks once relocated into
          # Contents/Frameworks, and (b) libraries the executable links directly
          # such as libomp. Without this the .dmg crashes on a clean Mac with
          # "Library not loaded: @rpath/libgeos...". The script walks the
          # dependency closure from the executables AND frameworks, pulls in
          # whatever is missing, normalizes install names, and re-signs every
          # binary it touched — including the Qt frameworks, without which the
          # invalidated code seal makes Gatekeeper report the app as "damaged".
          chmod +x scripts/macos-fix-deps.sh
          for app in staging/Blaze.app staging/Blaze3D.app; do
            [ -d "$app/Contents/Frameworks" ] && scripts/macos-fix-deps.sh "$app"
          done
      - name: Verify bundles are self-contained + validly signed
        run: |
          # Hard gate: fail the build if any bundle still references a host-only
          # library (Homebrew/Qt/Cellar) or has an invalid code signature — i.e.
          # anything that would crash or show "damaged" on a clean Mac. The CI
          # runner HAS Qt/GDAL/Homebrew, so without this check a half-bundled app
          # can pass the blaze-cli smoke test yet be broken for end users.
          chmod +x scripts/macos-verify-bundle.sh
          apps=()
          for app in staging/Blaze.app staging/Blaze3D.app; do
            [ -d "$app/Contents/Frameworks" ] && apps+=("$app")
          done
          scripts/macos-verify-bundle.sh "${apps[@]}"
      - name: Package (DMG)
        run: |
          if [ -n "${{ steps.version.outputs.version }}" ]; then
            VERSION="${{ steps.version.outputs.version }}"
          else
            VERSION=$(cmake -L -N build 2>/dev/null | grep "^CMAKE_PROJECT_VERSION:STATIC=" | cut -d= -f2 || echo "dev")
          fi
          ARCH=$(uname -m)
          DMG="build/Blaze-${VERSION}-macOS-${ARCH}.dmg"

          # hdiutil create intermittently fails with "Resource busy" on the
          # macOS runners (Spotlight/mds is still indexing the freshly written
          # staging tree — more so now that we copy the asset tree into each
          # .app). Flush pending writes, detach any stale Blaze volume, and
          # retry with backoff so a transient lock doesn't fail the release.
          sync
          hdiutil detach /Volumes/Blaze -force 2>/dev/null || true
          created=false
          for i in 1 2 3 4 5; do
            if hdiutil create -volname "Blaze" -srcfolder staging -ov -format UDZO "$DMG"; then
              created=true
              break
            fi
            echo "hdiutil create failed (attempt $i), retrying in 10s..."
            sleep 10
          done
          if [ "$created" != true ]; then
            echo "Failed to create DMG after 5 attempts"
            exit 1
          fi
          echo "DMG: $DMG"
      - name: Test installer
        run: |
          DMG=$(ls build/Blaze-*.dmg | head -1)

          hdiutil detach /Volumes/Blaze -force 2>/dev/null || true

          attached=false
          for i in 1 2 3 4 5; do
            if hdiutil attach "$DMG" -mountpoint /Volumes/Blaze -readonly -nobrowse -noautoopen; then
              attached=true
              break
            fi
            echo "hdiutil attach failed (attempt $i), retrying in 5s..."
            sleep 5
          done
          if [ "$attached" != true ]; then
            echo "Failed to attach DMG after 5 attempts"
            exit 1
          fi

          cp -r "/Volumes/Blaze/share/assets" /tmp/blaze-test
          "/Volumes/Blaze/bin/blaze-cli" /tmp/blaze-test/default_config.json
          hdiutil detach /Volumes/Blaze -force
      # See note on the Windows job — only keep artifacts on tags / debug runs.
      - name: Upload Artifact
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: blaze-macos-${{ matrix.arch }}-dmg
          path: build/Blaze-*.dmg
          retention-days: 2
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          token: ${{ secrets.BLAZE_RELEASE_TOKEN }}
          files: build/Blaze-*.dmg
  package-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get version from tag
        id: version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "Version: $TAG"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f qgis_plugin/requirements.txt ]; then pip install -r qgis_plugin/requirements.txt; fi
      - name: Package Plugin
        run: |
          cd qgis_plugin
          python package_plugin.py
      - name: Set plugin zip filename
        id: plugin_zip
        run: |
          cd qgis_plugin
          # Find the generated zip file (it will have version in name: blaze_loader_qgis_plugin_v*.zip)
          ZIP_FILE=$(ls blaze_loader_qgis_plugin*.zip | head -1)
          if [ -z "$ZIP_FILE" ]; then
            echo "ERROR: No zip file found"
            exit 1
          fi
          echo "Found zip: $ZIP_FILE"
          echo "zip_path=qgis_plugin/$ZIP_FILE" >> $GITHUB_OUTPUT
          echo "zip_name=$ZIP_FILE" >> $GITHUB_OUTPUT
      # Plugin zip is published to the GitHub Release on tags; skip Actions
      # artifact storage except for manual debug runs (see Windows job note).
      - name: Upload Artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: blaze-qgis-plugin
          path: ${{ steps.plugin_zip.outputs.zip_path }}
          retention-days: 2
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          token: ${{ secrets.BLAZE_RELEASE_TOKEN }}
          files: ${{ steps.plugin_zip.outputs.zip_path }}
