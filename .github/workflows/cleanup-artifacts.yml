---
name: Remove old artifacts
on:
  schedule:
    # Every day at 3am AEST (5pm UTC previous day)
    - cron: '0 17 * * *'
jobs:
  remove-old-artifacts:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # For private repos
    permissions:
      actions: write
    steps:
      - name: Remove old artifacts
        uses: c-hive/gha-remove-artifacts@v1
        with:
          age: '1 week' # Remove artifacts older than 1 week
          # Optional inputs

# skip-tags: true
# skip-recent: 5
